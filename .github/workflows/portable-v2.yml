name: Build Portable V2

on:
  workflow_dispatch:
  push:
    tags:
      - "v2.*"

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        env:
          PYTHONUTF8: "1"
        run: python -B -m unittest discover -s tests -v

      - name: Build and verify portable package
        shell: powershell
        run: .\scripts\build_portable.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: JapaneseStrokeMouseWriter-v2.3.2-win-x64-portable
          path: |
            dist/JapaneseStrokeMouseWriter-v2.3.2-win-x64-portable.zip
            dist/JapaneseStrokeMouseWriter-v2.3.2-win-x64-portable.zip.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v2.')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "dist/JapaneseStrokeMouseWriter-v2.3.2-win-x64-portable.zip" `
            "dist/JapaneseStrokeMouseWriter-v2.3.2-win-x64-portable.zip.sha256" `
            --title "Japanese Stroke Mouse Writer V2.3.2 Portable" `
            --notes "Adds adaptive character spacing: halfwidth-to-halfwidth pairs use half of the configured gap, while pairs containing a fullwidth character use the full gap. This release also adds the MIT license and public [Code signing policy](https://github.com/Tsukira1229/japanese-stroke-mouse-writer/blob/main/CODE_SIGNING_POLICY.md) for the pending SignPath Foundation application. V2.3.2 remains unsigned, so Windows SmartScreen may show a warning."
