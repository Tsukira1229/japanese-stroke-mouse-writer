name: Build Portable V2

on:
  workflow_dispatch:
  push:
    tags:
      - "v2.*"

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        env:
          PYTHONUTF8: "1"
        run: python -B -m unittest discover -s tests -v

      - name: Build and verify portable package
        shell: powershell
        run: .\scripts\build_portable.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: JapaneseStrokeMouseWriter-v2.1.1-win-x64-portable
          path: |
            dist/JapaneseStrokeMouseWriter-v2.1.1-win-x64-portable.zip
            dist/JapaneseStrokeMouseWriter-v2.1.1-win-x64-portable.zip.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v2.')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "dist/JapaneseStrokeMouseWriter-v2.1.1-win-x64-portable.zip" `
            "dist/JapaneseStrokeMouseWriter-v2.1.1-win-x64-portable.zip.sha256" `
            --title "Japanese Stroke Mouse Writer V2.1.1 Portable" `
            --notes "Fixes punctuation scaling so commas, periods, Japanese punctuation, and other supported symbols retain their natural size and position within the character cell. This Windows x64 portable build is unsigned, so Windows SmartScreen may show a warning."
